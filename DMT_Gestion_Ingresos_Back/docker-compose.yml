services:

  db:
    image: postgres:16-alpine
    container_name: dmt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dmt_ingresos}
      POSTGRES_USER: ${POSTGRES_USER:-dmt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dmt_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dmt_user} -d ${POSTGRES_DB:-dmt_ingresos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: dmt_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-dmt_user}:${POSTGRES_PASSWORD:-dmt_password}@db:5432/${POSTGRES_DB:-dmt_ingresos}
    volumes:
      - registros_data:/app/data/registros
      - ocr_data:/app/data/ocr_resultados
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Para acceder a cámaras en la red local

volumes:
  postgres_data:
  registros_data:
  ocr_data:
